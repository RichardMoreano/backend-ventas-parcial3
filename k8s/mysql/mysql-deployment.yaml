apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql

        image: mysql:8.0

        ports:
        - containerPort: 3306

        env:
          - name: MYSQL_ROOT_PASSWORD
            value: root123

          - name: MYSQL_DATABASE
            value: despacho_db

          - name: MYSQL_USER
            value: appuser

          - name: MYSQL_PASSWORD
            value: appuser123

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"