name: CI CD - Ventas

on:
  push:
    branches: [ deploy ]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR=${{ secrets.ECR_REPO }}
          echo "Construyo y subo imagen: $ECR:$IMAGE_TAG"
          docker build -t $ECR:$IMAGE_TAG .
          docker push $ECR:$IMAGE_TAG

      - name: Configure kubectl for EKS (AWS CLI Oficial)
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Desplegar DB y Arquitectura de Ventas en EKS
        env:
          ECR: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Desplegar los componentes de MySQL primero si existen en k8s/mysql
          if [ -d "k8s/mysql" ]; then
            kubectl apply -f k8s/mysql/
          fi
          
          # 2. Modifica el tag de la imagen del microservicio de Ventas
          sed -i "s|image:.*|image: ${ECR}:${IMAGE_TAG}|g" k8s/deployment.yaml
          
          # 3. Aplica todos los manifiestos del microservicio (Deployment, Service, HPA, Ingress)
          kubectl apply -f k8s/