name: CI CD - Ventas

on:
  push:
    branches: [ deploy ]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR=${{ secrets.ECR_REPO }}
          echo "Construyo y subo imagen: $ECR:$IMAGE_TAG"
          docker build -t $ECR:$IMAGE_TAG .
          docker push $ECR:$IMAGE_TAG

      - name: Configure kubectl for EKS
        uses: aws-actions/eks-update-kubeconfig@v2
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ secrets.AWS_REGION }}

      - name: Desplegar en EKS (actualizo la imagen)
        env:
          ECR: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/ventas-deployment ventas=$ECR:${IMAGE_TAG} -n default || kubectl apply -f k8s/deployment.yaml
